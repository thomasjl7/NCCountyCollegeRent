<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>North Carolina Colleges and County Rent</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.0/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v7.1.0/css/all.css">
    

    <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; background: #fff; }

    .legend {
    line-height: 40px;
    font-size: 16px;
    width: 190px;
    color: #333333;
    padding: 6px 8px;
    background: white;
    background: rgba(255,255,255,0.5);
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    border-radius: 5px;
}
 
.legend i {
    width: 20px;
    height: 20px;
    float: left;
    margin-right: 8px;
    opacity: 0.9;
}
 
.legend img {
    width: 16px;
    height: 16px;
    margin-right: 3px;
    float: left;
}
 
.legend p {
    font-size: 14px;
    line-height: 20px;
    margin: 0;
}

.legend {

    font-family: 'Titillium Web', sans-serif;

}

    </style>
        <link href="https://fonts.googleapis.com/css?family=Titillium+Web" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.7.0/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-ajax/2.1.0/leaflet.ajax.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/1.3.4/chroma.min.js"></script>

</head>
<body>
<div id="map"></div>
    <h1>North Carolina Average County Rent compared to type of higher education in county</h1>
<script>
var mymap = L.map('map', {
    center: [35.3446,-79.7440], 
    zoom: 8, 
    maxZoom: 100,
    
    detectRetina: true 
});
 
L.tileLayer('http://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(mymap);

var CountyColleges = null;

var colors = chroma.scale('Set1').mode('lch').colors(3);


for (i = 0; i < 3; i++) {
    $('head').append($("<style> .marker-color-" + (i + 1).toString() + " { color: " + colors[i] + "; font-size: 20px; text-shadow: 0 0 3px #ffffff;} </style>"));
}
CountyColleges = L.geoJson.ajax("assets/CountyColleges.geojson",{
 
pointToLayer: function(feature, latlng) {
    var id = 0;
    if (feature.properties.naicsdescr == "UNIVERSITIES") { id = 0; }
    else if (feature.properties.naicsdescr == "COMMUNITY COLLEGES")  { id = 1; }
    else { id = 2;}
    return L.marker(latlng, {icon: L.divIcon({className: 'fas fa-solid fa-graduation-cap marker-color-' + (id + 1).toString() })});
  },
    attribution: 'NC County Rent Data provided by <a href="https://data.census.gov/map/040XX00US37,37$0500000/ACSDT5Y2023/B25031?t=Renter+Costs&layer=VT_2023_050_00_PY_D1&loc=35.1829,-80.4917,z5.4786" target="_blank">US Census Bureau</a> | NC College Data provided by <a href="https://www.nconemap.gov/datasets/ce5bbbe0c8194778859df0d3e02be3e7_0/explore?location=35.074393%2C-79.708728%2C8.42" target="_blank">NC OneMap</a> | Base Map &copy; CartoDB | Map Author: Josh Thomas '
});
CountyColleges.addTo(mymap);


CountyColleges = L.geoJson.ajax("assets/CountyColleges.geojson",{
 
  
  onEachFeature: function (feature, layer) {
      layer.bindPopup(feature.properties.name);
  },
  
 
  pointToLayer: function(feature, latlng) {
      var id = 0;
      if (feature.properties.naicsdescr == "UNIVERSITIES") { id = 0; }
        else if (feature.properties.naicsdescr == "COMMUNITY COLLEGES")  { id = 1; }
        else { id = 2;} 
        return L.marker(latlng, {icon: L.divIcon({className: 'fas fa-solid fa-graduation-cap marker-color-' + (id + 1).toString() })});
  },
}).addTo(mymap);


function style(feature) {
    return {
        fillColor: setColor(feature.properties.MedianRent),
        fillOpacity: 1,
        weight: 2,
        opacity: 1,
        color: '#b4b4b4',
        dashArray: '4'
    };
}

colors = chroma.scale('Blues').colors(5); 
 
function setColor(MedianRent) {
    var id = 0;
    if (MedianRent > 1400) { id = 4; } 
    else if (MedianRent > 1150 && MedianRent <= 1400) { id = 3; } 
    else if (MedianRent > 900 && MedianRent <= 1150) { id = 2; } 
    else if (MedianRent > 700 &&  MedianRent <= 950) { id = 1; }
    else  { id = 0; }
    return colors[id];
}

L.geoJson.ajax("assets/NCCounty.geojson").addTo(mymap);


L.geoJson.ajax("assets/NCCounty.geojson", {
    style: style
}).addTo(mymap);


var legend = L.control({position: 'topright'});
 

legend.onAdd = function () {
 
    
    var div = L.DomUtil.create('div', 'legend');
    
    div.innerHTML += '<b>Median Rent in Dollars</b><br />';
    
    
    div.innerHTML += '<i style="background: ' + colors[4] + '; opacity: 0.5"></i><p>1400+</p>';
    div.innerHTML += '<i style="background: ' + colors[3] + '; opacity: 0.5"></i><p>1150-1400</p>';
    div.innerHTML += '<i style="background: ' + colors[2] + '; opacity: 0.5"></i><p>900-1150</p>';
    div.innerHTML += '<i style="background: ' + colors[1] + '; opacity: 0.5"></i><p>700-950</p>';
    div.innerHTML += '<i style="background: ' + colors[0] + '; opacity: 0.5"></i><p>Less than 700</p>';
    
    div.innerHTML += '<hr><b>College Type<b><br />';
    
    
    div.innerHTML += '<i class="fas fa-solid fa-graduation-cap marker-color-1"></i><p>Universities</p>';
    div.innerHTML += '<i class="fas fa-solid fa-graduation-cap marker-color-2"></i><p>Community Colleges</p>';
    div.innerHTML += '<i class="fas fa-solid fa-graduation-cap marker-color-3"></i><p>Other</p>';
    
    return div;
};
 

legend.addTo(mymap);

L.control.scale({position: 'bottomleft'}).addTo(mymap);



</script>
</body>
</html>
